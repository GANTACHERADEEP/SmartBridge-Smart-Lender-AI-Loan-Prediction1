<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Lender</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="overlay"></div>

    <div class="container py-5">

        <!-- Heading -->

        <div class="text-center mb-5">

            <h1 class="title">

                <i class="fa-solid fa-building-columns"></i>

                Smart Lender

            </h1>

            <p class="subtitle">

                AI Powered Loan Eligibility Prediction System

            </p>

        </div>

        <div class="card glass-card shadow-lg">

            <div class="card-body p-5">

                <form action="/predict" method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>Gender</label>

                            <select class="form-select" name="Gender">

                                <option>Male</option>

                                <option>Female</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Married</label>

                            <select class="form-select" name="Married">

                                <option>Yes</option>

                                <option>No</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Dependents</label>

                            <select class="form-select" name="Dependents">

                                <option>0</option>

                                <option>1</option>

                                <option>2</option>

                                <option>3+</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Education</label>

                            <select class="form-select" name="Education">

                                <option>Graduate</option>

                                <option>Not Graduate</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Self Employed</label>

                            <select class="form-select" name="Self_Employed">

                                <option>No</option>

                                <option>Yes</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Property Area</label>

                            <select class="form-select" name="Property_Area">

                                <option>Urban</option>

                                <option>Semiurban</option>

                                <option>Rural</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Applicant Income</label>

                            <input
                                class="form-control"
                                type="number"
                                name="ApplicantIncome"
                                min="0"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Co Applicant Income</label>

                            <input
                                class="form-control"
                                type="number"
                                name="CoapplicantIncome"
                                min="0"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Loan Amount</label>

                            <input
                                class="form-control"
                                type="number"
                                name="LoanAmount"
                                min="0"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Loan Term</label>

                            <input
                                class="form-control"
                                type="number"
                                value="360"
                                name="Loan_Amount_Term"
                                min="0"
                                required>

                        </div>

                        <div class="col-md-12 mb-4">

                            <label>Credit History</label>

                            <select class="form-select" name="Credit_History">

                                <option value="1">Good Credit History</option>

                                <option value="0">Bad Credit History</option>

                            </select>

                        </div>

                        <div class="col-12 text-center">

                            <button class="btn predict-btn">

                                <i class="fa-solid fa-chart-line"></i>

                                Predict Loan Eligibility

                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

        <div class="row mt-5">

            <div class="col-md-3">

                <div class="info-card">

                    <h4>4</h4>

                    <p>ML Models</p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="info-card">

                    <h4>KNN</h4>

                    <p>Best Model</p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="info-card">

                    <h4>84.55%</h4>

                    <p>Accuracy</p>

                </div>

            </div>

            <div class="col-md-3">

                <div class="info-card">

                    <h4>AI</h4>

                    <p>Prediction</p>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
